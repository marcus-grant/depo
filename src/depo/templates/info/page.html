{% extends "base.html" %}
{% block content %}
<!-- BEGIN: info/page.html#content -->
<!-- EXTENDS: base.html -->
<article class="window">
  <h2 class="shortcode">{{ item.code | upper }}</h2>
  <div class="action-row" role="toolbar">
    {% block copy_content %}<button disabled>Copy Content</button>{% endblock %}
    {% block copy_link %}<button class="secondary" disabled>Copy Link</button>{% endblock %}
    <button class="outline" data-copy="{{ item.code | upper }}">Copy Code</button>
    <a href="/{{ item.code }}/raw">View Raw</a>
    <a href="#metadata">Facts</a>
  </div>
  <div class="payload {% block payload_class %}{% endblock %}" id="payload">
    {% block payload %}
    {% endblock %}
  </div>
  <hr class="divider">
  <dl class="meta" id="metadata">
    {% block metadata %}
    {% endblock %}
  </dl>
</article>
<!-- END: info/page.html#content -->
{% endblock %}
<!-- TODO: Does base.html need a scripts block? -->
{% block scripts %}
<!-- BEGIN: info/page.html#scripts -->
<!-- EXTENDS: base.html -->
<script>
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-copy], button[data-copy-url]');
    if (!btn) return;
    if (btn.dataset.copy !== undefined) {
      navigator.clipboard.writeText(btn.dataset.copy);
      return;
    }
    const resp = await fetch(btn.dataset.copyUrl);
    const ct = resp.headers.get('content-type') || '';
    if (ct.startsWith('text/')) {
      navigator.clipboard.writeText(await resp.text());
    } else {
      const blob = await resp.blob();
      navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    }
  });
</script>
<!-- END: info/page.html#scripts -->
{% endblock %}
