<script>
(function () {
  const form = document.querySelector('form');
  const textarea = document.querySelector('textarea[name="content"]');
  const fileInput = document.getElementById('file-input');
  const card = document.querySelector('.attachment-card');
  const preview = card.querySelector('.attachment-preview');
  const nameEl = card.querySelector('.attachment-name');
  const sizeEl = card.querySelector('.attachment-size');
  const clearBtn = card.querySelector('.attachment-clear');
  let objectUrl = null;

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function attachFile(file) {
    form.enctype = 'multipart/form-data';
    form.setAttribute('hx-encoding', 'multipart/form-data');
    textarea.hidden = true;
    card.hidden = false;
    nameEl.textContent = file.name;
    sizeEl.textContent = formatSize(file.size);

    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = null;

    if (file.type.startsWith('image/')) {
      objectUrl = URL.createObjectURL(file);
      preview.src = objectUrl;
      preview.hidden = false;
    } else {
      preview.hidden = true;
      if (file.type.startsWith('text/')) {
        const reader = new FileReader();
        reader.onload = () => {
          const snippet = reader.result.slice(0, 200);
          preview.hidden = true;
          nameEl.textContent = file.name + ' — ' + snippet;
        };
        reader.readAsText(file);
      }
    }
  }

  function setFiles(file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
  }

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) attachFile(fileInput.files[0]);
  });

  textarea.addEventListener('paste', (e) => {
    const file = e.clipboardData?.files?.[0];
    if (!file) return;
    e.preventDefault();
    setFiles(file);
    attachFile(file);
  });

  textarea.addEventListener('dragover', (e) => e.preventDefault());

  textarea.addEventListener('drop', (e) => {
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    e.preventDefault();
    setFiles(file);
    attachFile(file);
  });

  clearBtn.addEventListener('click', () => {
    fileInput.value = '';
    form.enctype = 'application/x-www-form-urlencoded';
    form.removeAttribute('hx-encoding');
    textarea.hidden = false;
    textarea.value = '';
    card.hidden = true;
    preview.hidden = true;
    if (objectUrl) { URL.revokeObjectURL(objectUrl); objectUrl = null; }
  });
})();
</script>
<!-- END: upload/scripts.html -->
